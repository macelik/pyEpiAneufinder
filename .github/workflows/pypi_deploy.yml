name: PyPI Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish, for example v0.3.6"
        required: true
        type: string

concurrency:
  group: pypi-deploy-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve effective tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            case "$TAG" in
              v*) ;;
              *)
                echo "Manual tag input must start with v: $TAG"
                exit 1
                ;;
            esac
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "effective_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate manual dispatch runs from default branch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "workflow_dispatch must run from the default branch ${{
              github.event.repository.default_branch
            }}, not ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Validate manual tag exists in remote
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EFFECTIVE_TAG: ${{ steps.tag.outputs.effective_tag }}
        run: |
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          if ! git ls-remote --tags --exit-code "$REPO_URL" "refs/tags/${EFFECTIVE_TAG}" >/dev/null; then
            echo "Manual tag ${EFFECTIVE_TAG} does not exist in the remote repository ${GITHUB_REPOSITORY}"
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.tag.outputs.effective_tag }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Verify checked out commit matches tag
        env:
          EFFECTIVE_TAG: ${{ steps.tag.outputs.effective_tag }}
        run: |
          git fetch --force --tags origin
          TAG_COMMIT=$(git rev-list -n 1 "$EFFECTIVE_TAG")
          HEAD_COMMIT=$(git rev-parse HEAD)
          if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
            echo "Checked out commit $HEAD_COMMIT does not match tag $EFFECTIVE_TAG commit $TAG_COMMIT"
            exit 1
          fi

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.3.0 twine==6.2.0

      - name: Clean old build artifacts
        run: rm -rf build dist *.egg-info

      - name: Validate tag version matches pyproject.toml
        env:
          EFFECTIVE_TAG: ${{ steps.tag.outputs.effective_tag }}
        run: |
          # This workflow expects project.version in pyproject.toml to be the source of truth.
          TAG_VERSION="${EFFECTIVE_TAG#v}"
          PACKAGE_VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              data = tomllib.load(fh)
          print(data["project"]["version"])
          PY
          )
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - name: Upload distributions artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pyEpiAneufinder/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions artifact
        uses: actions/download-artifact@fd6355b2d34f0c7f31d18011bb3f8fb30f4247eb # v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
