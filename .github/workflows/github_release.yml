name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release, for example v0.3.6"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: github-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve effective tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            case "$TAG" in
              v*) ;;
              *)
                echo "Manual tag input must start with v: $TAG"
                exit 1
                ;;
            esac
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "effective_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate manual tag exists in remote
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EFFECTIVE_TAG: ${{ steps.tag.outputs.effective_tag }}
        run: |
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          if ! git ls-remote --tags --exit-code "$REPO_URL" "refs/tags/${EFFECTIVE_TAG}" >/dev/null; then
            echo "Manual tag ${EFFECTIVE_TAG} does not exist in the remote repository ${GITHUB_REPOSITORY}"
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.tag.outputs.effective_tag }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.3.0 twine==6.2.0

      - name: Validate tag version matches pyproject.toml
        env:
          EFFECTIVE_TAG: ${{ steps.tag.outputs.effective_tag }}
        run: |
          # This workflow expects project.version in pyproject.toml to be the source of truth.
          TAG_VERSION="${EFFECTIVE_TAG#v}"
          PACKAGE_VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              data = tomllib.load(fh)
          print(data["project"]["version"])
          PY
          )
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EFFECTIVE_TAG: ${{ steps.tag.outputs.effective_tag }}
        run: |
          TAG="${EFFECTIVE_TAG}"
          TITLE="${EFFECTIVE_TAG}"
          NOTES_FILE="RELEASE_NOTES_${EFFECTIVE_TAG}.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          elif [ -f "$NOTES_FILE" ]; then
            gh release create "$TAG" dist/* --title "$TITLE" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" dist/* --title "$TITLE" --generate-notes
          fi
